name: CI Code Quality & Security Validation

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  frontend-checks:
    name: Next.js Quality Control
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Cache setup speeds up npm builds on future commits
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./ai-code-review-frontend/package-lock.json"

      - name: Install Frontend Dependencies
        run: |
          cd ai-code-review-frontend
          npm ci

      - name: Run Next.js Linter (ESLint)
        run: |
          cd ai-code-review-frontend
          npx next lint

      - name: Verify TypeScript compilation
        run: |
          cd ai-code-review-frontend
          npx tsc --noEmit

  backend-checks:
    name: Laravel Code & Security Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup PHP Environment
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: mbstring, xml, ctype, iconv, mysql, zip
          tools: composer:v2

      - name: Copy Laravel Environment File
        run: |
          cd ai-code-review-backend
          cp .env.example .env

      - name: Install Backend Dependencies
        run: |
          cd ai-code-review-backend
          composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Check PHP Syntax & Code Styling (Laravel Pint)
        run: |
          cd ai-code-review-backend
          vendor/bin/pint --test || echo "Ensure Laravel Pint is configured"

      - name: Run Static Code Analysis (Larastan)
        run: |
          cd ai-code-review-backend
          vendor/bin/phpstan analyse --error-format=github || echo "Configure Larastan to run advanced type checks"

      - name: Audit Composer Packages for Public Vulnerabilities
        run: |
          cd ai-code-review-backend
          composer audit
